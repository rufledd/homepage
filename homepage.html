<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        body {
            background: linear-gradient(135deg, #4f46e5 0%, #db2777 100%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #ffffff;
            transition: background 0.5s ease;
        }

        .top-toolbar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 8px 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 60px;
            font-size: 14px;
            font-weight: 500;
        }

        #clock-display {
            margin-right: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .btn:hover, body.edit-mode #toggle-edit-mode {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .btn .material-symbols-outlined {
            font-size: 20px;
        }

        #wallpaper-input {
            display: none;
        }

        .dashboard-container {
            width: 100%;
            max-width: 950px;
            display: flex;
            flex-direction: column;
            gap: 36px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 8px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .delete-group-btn {
            display: none;
            color: #ff8787;
            margin-left: auto;
        }

        .delete-group-btn:hover {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        body.edit-mode .delete-group-btn,
        body.edit-mode .add-tile-btn {
            display: flex;
        }

        .grid-container.collapsed {
            display: none !important;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* TILE STYLES */
        .grid-tile {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.15);
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            box-sizing: border-box;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            overflow: hidden; /* Ensures contents don't bleed out during expansion */
        }

        /* Expansion & URL Reveal on Hover */
        .grid-tile:hover:not(.add-tile-btn) {
            transform: scale(1.1); /* Expand effect */
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 30px 0 rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .tile-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        .url-details {
            display: none; /* Hidden by default */
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.3); /* Grey background */
            color: #e2e8f0;
            font-size: 10px;
            text-align: center;
            padding: 8px 0;
            border-radius: 0 0 30px 30px;
        }

        .grid-tile:hover .url-details {
            display: block; /* Show on hover */
        }

        .tile-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            border-radius: 10px;
        }

        .add-tile-btn {
            display: none;
            border: 1px dashed rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            flex-direction: column;
            gap: 8px;
        }
        
        .add-tile-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.9);
            color: #ffffff;
        }

        body.edit-mode .grid-tile:not(.add-tile-btn) {
            border-color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            animation: gentle-pulse 2s infinite;
        }

        @keyframes gentle-pulse {
            0% { box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.15); }
            50% { box-shadow: 0 4px 16px 0 rgba(255, 255, 255, 0.3); }
            100% { box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.15); }
        }

        body.edit-mode .grid-tile:not(.add-tile-btn)::before {
            content: "edit";
            font-family: 'Material Symbols Outlined';
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>

    <div class="top-toolbar">
        <span id="clock-display">12:00 PM</span>
        <button class="btn" id="toggle-edit-mode" title="Configure Dashboard">
            <span class="material-symbols-outlined">settings</span>
        </button>
        <button class="btn" id="add-group-btn" style="display:none;" title="Add New Group">
            <span class="material-symbols-outlined">create_new_folder</span>
        </button>
        <label class="btn" for="wallpaper-input" title="Change Wallpaper">
            <span class="material-symbols-outlined">wallpaper</span>
        </label>
        <input type="file" id="wallpaper-input" accept="image/*">
    </div>

    <div class="dashboard-container" id="main-dashboard"></div>

    <script>
        const defaultData = [
            {
                id: "group-1",
                title: "School",
                collapsed: false,
                links: [{ name: "Workspace", url: "https://google.com", icon: "https://www.google.com/favicon.ico" }]
            },
            {
                id: "group-2",
                title: "Frequently Used",
                collapsed: false,
                links: [
                    { name: "Deezer", url: "https://deezer.com", icon: "https://www.deezer.com/favicon.ico" },
                    { name: "YouTube", url: "https://youtube.com", icon: "https://www.youtube.com/favicon.ico" },
                    { name: "Proton Mail", url: "https://proton.me", icon: "https://proton.me/favicon.ico" },
                    { name: "GitHub", url: "https://github.com", icon: "https://github.githubassets.com/favicons/favicon.svg" }
                ]
            }
        ];

        let dashboardData = JSON.parse(localStorage.getItem('glassyDashboardDataV3')) || defaultData;
        let editMode = false;

        // Helper to simplify URL
        function simplifyUrl(url) {
            return url.replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            document.getElementById('clock-display').textContent = `${hours}:${minutes} ${ampm} — ${now.getDate()} ${months[now.getMonth()]}`;
        }
        setInterval(updateClock, 1000); updateClock();

        function renderDashboard() {
            const container = document.getElementById('main-dashboard');
            container.innerHTML = '';

            dashboardData.forEach((group, groupIdx) => {
                const block = document.createElement('div');
                block.className = 'section-block';
                
                block.innerHTML = `
                    <div class="section-header">
                        <span class="section-title">${group.title}</span>
                        <button class="icon-btn" onclick="toggleSection('${group.id}')" title="${group.collapsed ? 'Expand' : 'Collapse'}">
                            <span class="material-symbols-outlined">${group.collapsed ? 'expand_more' : 'expand_less'}</span>
                        </button>
                        <button class="icon-btn delete-group-btn" onclick="deleteGroup(${groupIdx})" title="Remove Group">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                    <div id="${group.id}" class="grid-container ${group.collapsed ? 'collapsed' : ''}">
                        ${group.links.map((link, linkIdx) => `
                            <a href="${editMode ? '#' : link.url}" class="grid-tile" onclick="tileClick(event, ${groupIdx}, ${linkIdx})">
                                <div class="tile-content">
                                    <img src="${link.icon}" class="tile-icon" onerror="this.src='https://www.google.com/s2/favicons?sz=64&domain=${link.url}'">
                                    <span class="tile-label">${link.name}</span>
                                </div>
                                <div class="url-details">${simplifyUrl(link.url)}</div>
                            </a>
                        `).join('')}
                        <div class="grid-tile add-tile-btn" onclick="addTile(${groupIdx})">
                            <span class="material-symbols-outlined">add</span>
                        </div>
                    </div>
                `;
                container.appendChild(block);
            });
            localStorage.setItem('glassyDashboardDataV3', JSON.stringify(dashboardData));
        }

        function toggleSection(id) {
            const group = dashboardData.find(g => g.id === id);
            if (group) { group.collapsed = !group.collapsed; renderDashboard(); }
        }

        document.getElementById('add-group-btn').addEventListener('click', () => {
            const name = prompt("Group Title:");
            if (!name) return;
            dashboardData.push({ id: 'group-' + Date.now(), title: name, collapsed: false, links: [] });
            renderDashboard();
        });

        function deleteGroup(idx) {
            if (confirm(`Remove group "${dashboardData[idx].title}"?`)) {
                dashboardData.splice(idx, 1);
                renderDashboard();
            }
        }

        function addTile(groupIdx) {
            const name = prompt("Name:");
            const url = prompt("URL:", "https://");
            const icon = prompt("Custom Icon Image URL. Leave blank to auto-fetch:");
            
            if (name && url) {
                const finalIcon = icon || `https://www.google.com/s2/favicons?sz=128&domain=${url}`;
                dashboardData[groupIdx].links.push({ name, url, icon: finalIcon });
                renderDashboard();
            }
        }

        function tileClick(e, groupIdx, linkIdx) {
            if (!editMode) return;
            e.preventDefault();
            const link = dashboardData[groupIdx].links[linkIdx];
            
            if (confirm("Modify link configuration? (Cancel to delete this tile)")) {
                const name = prompt("Update Name:", link.name);
                const url = prompt("Update URL:", link.url);
                const icon = prompt("Update Custom Icon URL:", link.icon);
                
                if (name) link.name = name;
                if (url) link.url = url;
                if (icon) link.icon = icon;
            } else {
                dashboardData[groupIdx].links.splice(linkIdx, 1);
            }
            renderDashboard();
        }

        document.getElementById('toggle-edit-mode').addEventListener('click', () => {
            editMode = !editMode;
            document.body.classList.toggle('edit-mode', editMode);
            document.getElementById('add-group-btn').style.display = editMode ? 'flex' : 'none';
            
            const iconSpan = document.querySelector('#toggle-edit-mode .material-symbols-outlined');
            iconSpan.textContent = editMode ? "check" : "settings";
            
            renderDashboard();
        });

        document.getElementById('wallpaper-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgDataUrl = event.target.result;
                document.body.style.backgroundImage = `url('${imgDataUrl}')`;
                localStorage.setItem('glassyWallpaperV3', imgDataUrl);
            };
            reader.readAsDataURL(file);
        });

        const savedBg = localStorage.getItem('glassyWallpaperV3');
        if (savedBg) document.body.style.backgroundImage = `url('${savedBg}')`;
        renderDashboard();
    </script>
</body>
</html>
